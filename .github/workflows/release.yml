name: Release

# 打 tag(v*) 自动用 PyInstaller 打包 YiXianHUD.exe 并发布到 Releases。
# 全程不触碰游戏官方 DLL:用仓库里预编译的 native_hud/_build/YiXianHud32.dll,
# 只做 Python 打包(不编译 C#),所以 CI 无需任何游戏文件。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}   # 也允许手动触发

permissions:
  contents: write          # 创建 Release 需要

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: pip install pyinstaller frida blackboxprotobuf msgpack pystray pillow

      - name: Build YiXianHUD.exe
        run: python build_hud.py

      - name: Upload artifact (供手动触发时下载)
        uses: actions/upload-artifact@v4
        with:
          name: YiXianHUD
          path: YiXianHUD.exe

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: YiXianHUD.exe
          generate_release_notes: true

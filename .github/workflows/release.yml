name: Release

# 打 tag(v*) 自动用 PyInstaller 打包 YiXianHUD.exe 并发布到 Releases。
# 全程不触碰游戏官方 DLL:用仓库里预编译的 native_hud/_build/YiXianHud32.dll,
# 只做 Python 打包(不编译 C#),所以 CI 无需任何游戏文件。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}   # 也允许手动触发

permissions:
  contents: write          # 创建 Release 需要

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        # frida 锁在 16.x:17.x 是 breaking 大改(移除内置 bridge 等),会让 attach/spawn 注入失效。
        # 不锁版本时 CI 每次 pip 拿最新,某次正好拿到不兼容的 frida → 该次发布全员注入不上。
        run: pip install pyinstaller "frida>=16,<17" blackboxprotobuf msgpack pystray pillow

      - name: Build (完整 + Lite;spawn/attach 自动判定)
        shell: bash                       # set -e:任一构建失败即整步失败(pwsh 只看最后一条)
        run: |
          python build_hud.py
          python build_hud.py --lite

      - name: Upload artifact (供手动触发时下载)
        uses: actions/upload-artifact@v4
        with:
          name: YiXianHUD
          path: |
            YiXianHUD.exe
            YiXianHUD-lite.exe

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            YiXianHUD.exe
            YiXianHUD-lite.exe
          generate_release_notes: true
